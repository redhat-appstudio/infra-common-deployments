---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd-local
resources:
  - ../../base/all-clusters
  - ../../base/external
patches:
  - path: environment-patch.yaml
    target:
      group: argoproj.io
      version: v1alpha1
      kind: ApplicationSet
  - path: delete-argocd-repo-secrets-appset.yaml
    target:
      group: argoproj.io
      version: v1alpha1
      kind: ApplicationSet
      name: argocd-repo-secrets
  - path: delete-monitoring-workload-grafana-appset.yaml
    target:
      group: argoproj.io
      version: v1alpha1
      kind: ApplicationSet
      name: monitoring-workload-grafana
