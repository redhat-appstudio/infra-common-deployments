apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: k8s-groups
spec:
  goTemplate: true
  generators:
    - clusters:
        values:
          sourceRoot: components/k8s-groups
          environment: ""
          useCaseDir: rover
  template:
    metadata:
      name: k8s-groups-{{.nameNormalized}}
    spec:
      project: default
      source:
        # Since this app is in another repo that uses tier-only directories (staging/, production/),
        # extract just the tier from the environment path (e.g. "staging/external" → "staging").
        path: '{{.values.sourceRoot}}/{{dir .values.environment}}/{{.values.useCaseDir}}'
        repoURL: https://github.com/redhat-appstudio/internal-infra-deployments.git
        targetRevision: main
      destination:
        namespace: k8s-groups
        name: in-cluster
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: -1
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
