apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: ca-bundle
spec:
  goTemplate: true
  generators:
    - clusters:
        values:
          sourceRoot: components/ca-bundle
          environment: ""
  template:
    metadata:
      name: ca-bundle-{{.nameNormalized}}
    spec:
      project: default
      source:
        path: '{{.values.sourceRoot}}/{{trimPrefix "internal-" .values.environment}}'
        repoURL: https://github.com/redhat-appstudio/internal-infra-deployments.git
        targetRevision: main
      destination:
        namespace: openshift-config
        name: in-cluster
      syncPolicy:
        automated:
          # prune is false because of https://github.com/argoproj/argo-cd/issues/5792
          prune: false
          selfHeal: true
        syncOptions:
          - CreateNamespace=false
        retry:
          limit: -1
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
