---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: infra-deployments-kargo-resources-admin
rules:
  - apiGroups:
      - kargo.akuity.io
    resources:
      - "*"
    verbs:
      - "*"
  - apiGroups:
      - external-secrets.io
    resources:
      - externalsecrets
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: infra-deployments-kargo-resources-admin
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: konflux-devprod
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: konflux-infra
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: infra-deployments-kargo-resources-admin
