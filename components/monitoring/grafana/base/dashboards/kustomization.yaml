apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
# Removed dashboards for applications not in common clusters:
# - build-service/ (not in common)
# - dora-metrics/ (not in common)
# - has/ (not in common)
# - image-controller/ (not in common)
# - integration/ (not in common)
# - pipeline-service/ (not in common)
# - release/ (not in common)

# Kept dashboards relevant for common clusters:
- migration/
- performance/
- generic-dashboards/
- namespace-lister/
- kueue/
- kyverno/
- kubearchive/

# Removing the installation of power-monitoring dashboard for now
# - power-monitoring/

# Skip applying the grafana operands (integreatly.org) while the grafana operator is being installed.
# See more information about this option, here:
# https://argo-cd.readthedocs.io/en/stable/user-guide/sync-options/#skip-dry-run-for-new-custom-resources-types
commonAnnotations:
  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true

configurations:
  - cm-dashboard.yaml

namespace: "appstudio-grafana"
