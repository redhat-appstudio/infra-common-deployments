---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: konflux-support-ops-admins
  namespace: konflux-support-ops
rules:
  - apiGroups:
      - ''
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch
      - update
      - patch
      - delete

  - apiGroups:
      - ''
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
      - delete

  - apiGroups:
      - ''
    resources:
      - pods/exec
    verbs:
      - create

  - apiGroups:
      - ''
    resources:
      - configmaps
    verbs:
      - get
      - list
      - watch
      - delete

  - apiGroups:
      - ''
    resources:
      - persistentvolumes
    verbs:
      - get
      - list
      - create
      - update
      - delete

  - apiGroups:
      - ''
    resources:
      - persistentvolumeclaims
    verbs:
      - get
      - list
      - create
      - update
      - delete

---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: konflux-support-ops-admins
  namespace: konflux-support-ops
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: konflux-support-ops
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: konflux-support-ops-admins
