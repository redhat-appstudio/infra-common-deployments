---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: codecov
  labels:
    app: codecov
    component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: codecov
      component: redis
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: codecov
        component: redis
    spec:
      containers:
        - name: redis
          image: redis:6.2-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: redis-data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-pvc
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: codecov
  labels:
    app: codecov
    component: redis
spec:
  selector:
    app: codecov
    component: redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: codecov
  labels:
    app: codecov
    component: minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: codecov
      component: minio
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: codecov
        component: minio
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2020-04-15T00-39-01Z
          args: ["server", "/export"]
          ports:
            - containerPort: 9000
          env:
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: codecov-secrets
                  key: minio-access-key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: codecov-secrets
                  key: minio-secret-key
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: archive-data
              mountPath: /export
            - name: minio-config
              mountPath: /.minio
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: archive-data
          persistentVolumeClaim:
            claimName: archive-pvc
        - name: minio-config
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: codecov
  labels:
    app: codecov
    component: minio
spec:
  selector:
    app: codecov
    component: minio
  ports:
    - port: 9000
      targetPort: 9000
