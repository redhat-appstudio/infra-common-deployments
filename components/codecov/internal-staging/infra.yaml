---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: codecov
  labels:
    app: codecov
    component: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: codecov
      component: postgres
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: codecov
        component: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "codecov"
            - name: POSTGRES_DB
              value: "codecov"
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: codecov-secrets
                  key: postgres-password
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-run
              mountPath: /var/run/postgresql
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "codecov"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "codecov"]
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
        - name: postgres-run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: codecov
  labels:
    app: codecov
    component: postgres
spec:
  selector:
    app: codecov
    component: postgres
  ports:
    - port: 5432
      targetPort: 5432
