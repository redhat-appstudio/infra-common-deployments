---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: codecov
  labels:
    app: codecov
    component: api
  annotations:
    ignore-check.kube-linter.io/no-read-only-root-fs: "third-party image requires writable root fs for startup scripts"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: codecov
      component: api
  template:
    metadata:
      labels:
        app: codecov
        component: api
    spec:
      securityContext:
        runAsUser: 1001
        runAsNonRoot: true
      initContainers:
        - name: build-ca-bundle
          image: codecov/self-hosted-api:latest-calver
          command:
            - sh
            - -c
            - cat /etc/ssl/certs/ca-certificates.crt /config/internal-ca.crt > /ca-certs/ca-bundle.crt
          securityContext:
            runAsNonRoot: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: codecov-config
              mountPath: /config
            - name: ca-certs
              mountPath: /ca-certs
      containers:
        - name: api
          image: codecov/self-hosted-api:latest-calver
          ports:
            - containerPort: 8000
          env:
            - name: SSL_CERT_FILE
              value: "/ca-certs/ca-bundle.crt"
            - name: REQUESTS_CA_BUNDLE
              value: "/ca-certs/ca-bundle.crt"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: codecov-config
              mountPath: /config
            - name: ca-certs
              mountPath: /ca-certs
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: codecov-config
          secret:
            secretName: codecov-secrets
            items:
              - key: codecov-yml
                path: codecov.yml
              - key: internal-ca-crt
                path: internal-ca.crt
        - name: ca-certs
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: codecov
  labels:
    app: codecov
    component: api
spec:
  selector:
    app: codecov
    component: api
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: codecov
  labels:
    app: codecov
    component: worker
  annotations:
    ignore-check.kube-linter.io/no-read-only-root-fs: "third-party image requires writable root fs for startup scripts"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: codecov
      component: worker
  template:
    metadata:
      labels:
        app: codecov
        component: worker
    spec:
      securityContext:
        runAsUser: 1001
        runAsNonRoot: true
      initContainers:
        - name: build-ca-bundle
          image: codecov/self-hosted-worker:latest-calver
          command:
            - sh
            - -c
            - cat /etc/ssl/certs/ca-certificates.crt /config/internal-ca.crt > /ca-certs/ca-bundle.crt
          securityContext:
            runAsNonRoot: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: codecov-config
              mountPath: /config
            - name: ca-certs
              mountPath: /ca-certs
      containers:
        - name: worker
          image: codecov/self-hosted-worker:latest-calver
          env:
            - name: RUN_ENV
              value: "ENTERPRISE"
            - name: SSL_CERT_FILE
              value: "/ca-certs/ca-bundle.crt"
            - name: REQUESTS_CA_BUNDLE
              value: "/ca-certs/ca-bundle.crt"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: codecov-config
              mountPath: /config
            - name: ca-certs
              mountPath: /ca-certs
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: codecov-config
          secret:
            secretName: codecov-secrets
            items:
              - key: codecov-yml
                path: codecov.yml
              - key: internal-ca-crt
                path: internal-ca.crt
        - name: ca-certs
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: codecov
  labels:
    app: codecov
    component: frontend
  annotations:
    ignore-check.kube-linter.io/no-read-only-root-fs: "third-party image runs sed on built assets at startup"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: codecov
      component: frontend
  template:
    metadata:
      labels:
        app: codecov
        component: frontend
    spec:
      securityContext:
        runAsUser: 1000
        runAsNonRoot: true
      containers:
        - name: frontend
          image: codecov/self-hosted-frontend:latest-calver
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          env:
            - name: CODECOV_BASE_HOST
              valueFrom:
                secretKeyRef:
                  name: codecov-secrets
                  key: codecov-hostname
            - name: CODECOV_API_HOST
              valueFrom:
                secretKeyRef:
                  name: codecov-secrets
                  key: codecov-hostname
            - name: CODECOV_IA_HOST
              valueFrom:
                secretKeyRef:
                  name: codecov-secrets
                  key: codecov-hostname
            - name: CODECOV_SCHEME
              value: "https"
            - name: CODECOV_GLE_HOST
              value: "gitlab.cee.redhat.com"
            - name: GITLAB_ENTERPRISE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: codecov-secrets
                  key: gitlab-client-id
          volumeMounts:
            - name: codecov-config
              mountPath: /config
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: codecov-config
          secret:
            secretName: codecov-secrets
            items:
              - key: codecov-yml
                path: codecov.yml
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: codecov
  labels:
    app: codecov
    component: frontend
spec:
  selector:
    app: codecov
    component: frontend
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: codecov
  labels:
    app: codecov
    component: gateway
  annotations:
    ignore-check.kube-linter.io/no-read-only-root-fs: "third-party image requires writable root fs for haproxy config generation"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: codecov
      component: gateway
  template:
    metadata:
      labels:
        app: codecov
        component: gateway
    spec:
      securityContext:
        runAsNonRoot: true
      initContainers:
        - name: copy-haproxy-config
          image: codecov/self-hosted-gateway:latest-calver
          command: ["sh", "-c", "cp -a /etc/haproxy/. /haproxy-config/"]
          securityContext:
            runAsNonRoot: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: haproxy-config
              mountPath: /haproxy-config
      containers:
        - name: gateway
          image: codecov/self-hosted-gateway:latest-calver
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          env:
            - name: CODECOV_GATEWAY_MINIO_ENABLED
              value: "true"
            - name: CODECOV_GATEWAY_CHROOT_DISABLED
              value: "true"
          volumeMounts:
            - name: codecov-config
              mountPath: /config
            - name: haproxy-config
              mountPath: /etc/haproxy
            - name: tmp
              mountPath: /tmp
            - name: haproxy-run
              mountPath: /var/run
            - name: haproxy-lib
              mountPath: /var/lib/haproxy
      volumes:
        - name: codecov-config
          secret:
            secretName: codecov-secrets
            items:
              - key: codecov-yml
                path: codecov.yml
        - name: haproxy-config
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: haproxy-run
          emptyDir: {}
        - name: haproxy-lib
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: codecov
  labels:
    app: codecov
    component: gateway
spec:
  selector:
    app: codecov
    component: gateway
  ports:
    - port: 8080
      targetPort: 8080
