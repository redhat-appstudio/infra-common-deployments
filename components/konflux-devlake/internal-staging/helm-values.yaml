lake:
  encryptionSecret:
    secret: devlake-encryption-key
  securityContext: {}
  containerSecurityContext: {}
  envs:
    REMOTE_PLUGIN_DIR: ""
    DISABLED_REMOTE_PLUGINS: "true"
    API_REQUESTS_PER_HOUR: "100000"
    LOGGING_DIR: "/tmp"
  envFrom:
    - configMapRef:
        name: devlake-config
    - secretRef:
        name: devlake-database-auth

mysql:
  useExternal: true
  externalServer: "kubernetes.default.svc.cluster.local"  # K8s API - always available
  externalPort: 443  # HTTPS port - always open

grafana:
  image:
    repository: devlake.docker.scarf.sh/apache/devlake-dashboard
    tag: v1.0.2
  podSecurityContext: {}
  securityContext:
    fsGroup: null
    runAsGroup: null
    runAsUser: null
  initChownData:
    enabled: false
  envFromSecrets:
    - name: "devlake-database-auth"
  env:
    TZ: "UTC"
    GF_SERVER_SERVE_FROM_SUBPATH: "true"
    GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
  grafana.ini:
    server:
      serve_from_subpath: "true"
      root_url: "%(protocol)s://%(domain)s/grafana/"

ui:
  securityContext: {}
  containerSecurityContext: {}
  basicAuth:
    enabled: true
    user: admin
    password: admin
    autoCreateSecret: true
    secretName: ""

service:
  type: ClusterIP

ingress:
  enabled: false

option:
  autoCreateSecret: false
  database: mysql
  connectionSecretName: "devlake-database-auth"
common:
  initContainerWaitDatabase: null