---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: konflux-devlake

resources:
- ../base
- ../base/oauth2-proxy
- external-secrets
- trusted-ca-configmap.yaml
- https://github.com/konflux-ci/konflux-devlake-mcp.git/k8s?ref=bd02a249f6504549eba9e7b36e3983a97bc599a1

patches:
- path: configmap-patch.yaml

helmCharts:
- name: devlake
  repo: https://apache.github.io/incubator-devlake-helm-chart
  version: 1.0.2
  releaseName: konflux-devlake
  namespace: konflux-devlake
  valuesFile: helm-values.yaml
  includeCRDs: true

images:
- name: quay.io/konflux-ci/konflux-devprod/devlake-mcp-server
  newName: quay.io/konflux-ci/konflux-devprod/devlake-mcp-server
  newTag: bd02a249f6504549eba9e7b36e3983a97bc599a1

commonAnnotations:
  argocd.argoproj.io/sync-wave: "-1"
