---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: konflux-devlake

resources:
- ../base
- ../base/oauth2-proxy
- external-secrets
- https://github.com/konflux-ci/konflux-devlake-mcp.git/k8s?ref=de791a7936ef889bb20a5992ac6b19b253dc597e

patches:
- path: configmap-patch.yaml

helmCharts:
- name: devlake
  repo: https://apache.github.io/incubator-devlake-helm-chart
  version: 1.0.2
  releaseName: konflux-devlake
  namespace: konflux-devlake
  valuesFile: helm-values.yaml
  includeCRDs: true

images:
- name: quay.io/konflux-ci/konflux-devprod/devlake-mcp-server
  newName: quay.io/konflux-ci/konflux-devprod/devlake-mcp-server
  newTag: de791a7936ef889bb20a5992ac6b19b253dc597e

commonAnnotations:
  argocd.argoproj.io/sync-wave: "-1"
