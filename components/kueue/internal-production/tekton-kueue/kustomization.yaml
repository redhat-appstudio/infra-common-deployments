---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- https://github.com/konflux-ci/tekton-kueue/config/default?ref=f6ea94781e283709dbbf33a626f6be4b96a61c85

images:
- name: konflux-ci/tekton-kueue
  newName: quay.io/konflux-ci/tekton-kueue
  newTag: f6ea94781e283709dbbf33a626f6be4b96a61c85

namespace: tekton-kueue

commonAnnotations:
  argocd.argoproj.io/sync-wave: "10"

configMapGenerator:
- name: tekton-kueue-config
  namespace: tekton-kueue
  behavior: replace
  files:
  - config.yaml

generatorOptions:
  disableNameSuffixHash: true

patches:
- path: controller-patch.yaml
  target:
    group: apps
    kind: Deployment
    name: tekton-kueue-controller-manager
    version: v1
- path: webhook-patch.yaml
  target:
    group: apps
    kind: Deployment
    name: tekton-kueue-webhook
    version: v1
- target:
    kind: Namespace
    name: tekton-kueue
  patch: |-
    - op: add
      path: /metadata/labels/openshift.io~1cluster-monitoring
      value: "true"
