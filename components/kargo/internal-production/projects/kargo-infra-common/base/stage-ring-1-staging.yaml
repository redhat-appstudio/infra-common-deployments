---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: ring-1-staging
  labels:
    kargo.akuity.io/shard: staging
  annotations:
    kargo.akuity.io/color: yellow
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: dummy-deployment
      sources:
        direct: true
    - origin:
        kind: Warehouse
        name: kargo
      sources:
        direct: true
  promotionTemplate:
    spec:
      vars:
        - name: repoURL
          value: https://github.com/redhat-appstudio/infra-common-deployments.git
        - name: component
          value: ${{ ctx.targetFreight.origin.name }}
        # - name: argocdApiUrl
        #   value: https://argocd-server.argocd-local.svc.cluster.local
      steps:
        - uses: git-clone
          as: clone
          config:
            repoURL: ${{ vars.repoURL }}
            checkout:
              - branch: main
                path: ./src
        - task:
            name: dummy-deployment-promote-ring-1
          as: dummy-deployment-promote
          vars:
            - name: srcPath
              value: ./src
        - task:
            name: kargo-promote-ring-1
          as: kargo-promote
          vars:
            - name: srcPath
              value: ./src
        - uses: git-commit
          as: commit
          config:
            path: ./src
            message: |
              chore(${{ ctx.stage }}): promote ${{ vars.component }}
        - uses: git-push
          as: push
          config:
            path: ./src
            targetBranch: ${{ ctx.project }}/${{ vars.component }}/ring-1-staging
            force: true
        - uses: git-open-pr
          as: open-pr
          continueOnError: true
          config:
            repoURL: ${{ vars.repoURL }}
            sourceBranch: ${{ ctx.project }}/${{ vars.component }}/ring-1-staging
            targetBranch: main
            title: "chore(${{ ctx.stage }}): promote ${{ vars.component }} to staging"
            labels:
              - ring-1
              - staging
              - automated-promotion
              - component/${{ vars.component }}
        - uses: git-wait-for-pr
          if: ${{ status('open-pr') != 'Errored' }}
          as: wait-for-pr
          config:
            repoURL: ${{ vars.repoURL }}
            prNumber: ${{ outputs['open-pr'].pr.id }}
        # TODO: Re-enable once ArgoCD API access is in place (shard controller + token)
        # Workaround for argocd-wait race condition (https://github.com/akuity/kargo/issues/6357)
