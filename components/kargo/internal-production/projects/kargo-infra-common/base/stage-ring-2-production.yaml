---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: ring-2-production
  annotations:
    kargo.akuity.io/color: violet
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: kargo
      sources:
        stages:
          - ring-1-staging
    - origin:
        kind: Warehouse
        name: rover-group-sync
      sources:
        stages:
          - ring-1-staging
  promotionTemplate:
    spec:
      vars:
        - name: repoURL
          value: https://github.com/redhat-appstudio/infra-common-deployments.git
        - name: component
          value: ${{ ctx.targetFreight.origin.name }}
      steps:
        - uses: git-clone
          as: clone
          config:
            repoURL: ${{ vars.repoURL }}
            checkout:
              - branch: main
                path: ./src
        - task:
            name: kargo-promote-ring-2
          as: kargo-promote
          vars:
            - name: srcPath
              value: ./src
        - task:
            name: rover-group-sync-promote-ring-2
          as: rover-group-sync-promote
          vars:
            - name: srcPath
              value: ./src
        - uses: git-commit
          as: commit
          config:
            path: ./src
            message: |
              chore(${{ ctx.stage }}): promote ${{ vars.component }}
        - uses: git-push
          as: push
          config:
            path: ./src
            targetBranch: ${{ ctx.project }}/${{ vars.component }}/ring-2-production
            force: true
        - uses: git-open-pr
          as: open-pr
          continueOnError: true
          config:
            repoURL: ${{ vars.repoURL }}
            sourceBranch: ${{ ctx.project }}/${{ vars.component }}/ring-2-production
            targetBranch: main
            title: "chore(${{ ctx.stage }}): promote ${{ vars.component }} to production"
            description: |
              ## Automated Promotion — Production (Ring 2)

              **Component:** `${{ vars.component }}`
              **Project:** `${{ ctx.project }}`
              **Stage:** `${{ ctx.stage }}`

              This PR was automatically created by [Kargo](https://kargo.io) as part of the
              `kargo-infra-common` promotion pipeline.

              ### What changed
              - Updated `${{ vars.component }}` configuration in the **internal-production** environment
                to align with freight verified in the staging ring.

              ### Merge policy
              This PR requires manual approval before merging to production.

              > **Note:** Do not manually edit this branch — it is force-pushed on each promotion cycle.
            labels:
              - ring-2
              - production
              - automated-promotion
              - component/${{ vars.component }}
        - uses: git-wait-for-pr
          if: ${{ status('open-pr') != 'Errored' }}
          as: wait-for-pr
          config:
            repoURL: ${{ vars.repoURL }}
            prNumber: ${{ outputs['open-pr'].pr.id }}
        - uses: argocd-update
          if: ${{ status('open-pr') != 'Errored' }}
          as: argocd-update
          config:
            apps:
              - name: ${{ vars.component }}-in-cluster
                namespace: argocd-local
                sources:
                  - repoURL: ${{ vars.repoURL }}
                    desiredRevision: ${{ outputs['wait-for-pr'].commit }}
