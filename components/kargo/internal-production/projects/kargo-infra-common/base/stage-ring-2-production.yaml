---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: ring-2-production
  annotations:
    kargo.akuity.io/color: violet
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: kargo
      sources:
        stages:
          - ring-1-staging
    - origin:
        kind: Warehouse
        name: kargo-helm
      sources:
        stages:
          - ring-1-staging
  promotionTemplate:
    spec:
      steps:
        - uses: git-clone
          as: clone
          config:
            repoURL: https://github.com/redhat-appstudio/infra-common-deployments.git
            checkout:
              - branch: main
                path: ./src
        - task:
            name: ring-2-promote
          as: promote
          vars:
            - name: srcPath
              value: ./src
        - uses: git-commit
          as: commit
          config:
            path: ./src
            message: |
              chore(${{ ctx.stage }}): promote infra-common components

              chart: ${{ chartFrom("oci://ghcr.io/akuity/kargo-charts", "kargo").Version }}
              kargo: ${{ imageFrom("quay.io/konflux-ci/kargo").Tag }}
              dex: ${{ imageFrom("quay.io/konflux-ci/dex").Tag }}
        - uses: git-push
          as: push
          config:
            path: ./src
            targetBranch: kargo-ring-2-production
            force: true
        - uses: git-open-pr
          as: open-pr
          continueOnError: true
          config:
            repoURL: https://github.com/redhat-appstudio/infra-common-deployments.git
            sourceBranch: kargo-ring-2-production
            targetBranch: main
            title: "chore(${{ ctx.stage }}): promote infra-common to production"
            description: |
              ## Ring 2 — Production Promotion

              Automated promotion of infrastructure components to the **production** ring.

              ### Images Promoted

              | Component | Image | Tag |
              |-----------|-------|-----|
              | chart | `oci://ghcr.io/akuity/kargo-charts/kargo` | `${{ chartFrom("oci://ghcr.io/akuity/kargo-charts", "kargo").Version }}` |
              | kargo | `quay.io/konflux-ci/kargo` | `${{ imageFrom("quay.io/konflux-ci/kargo").Tag }}` |
              | dex | `quay.io/konflux-ci/dex` | `${{ imageFrom("quay.io/konflux-ci/dex").Tag }}` |

              ### Promotion Details

              - **Project:** ${{ ctx.project }}
              - **Stage:** ${{ ctx.stage }}
              - **Promotion:** ${{ ctx.promotion }}
              - **Freight:** ${{ ctx.targetFreight.name }}
              - **Origin warehouse:** ${{ ctx.targetFreight.origin.name }}

              ---
              *This PR was automatically generated by [Kargo](https://kargo.akuity.io). Do not edit the source branch manually — it will be force-pushed on the next promotion.*
            labels:
              - ring-2
              - production
              - automated-promotion
