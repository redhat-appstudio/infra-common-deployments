---
apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: konflux-operator
spec:
  freightCreationPolicy: Automatic
  interval: 2h0m0s
  subscriptions:
    - image:
        repoURL: quay.io/konflux-ci/konflux-operator
        imageSelectionStrategy: NewestBuild
        discoveryLimit: 5
        allowTags: ^[0-9a-f]{40}$
