---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: ring-2
  annotations:
    kargo.akuity.io/color: yellow
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: authentication-manifest-wh
      sources:
        stages:
          - ring-1
        requiredSoakTime: 24h
  promotionTemplate:
    spec:
      vars:
        - name: repoURL
          value: https://github.com/redhat-appstudio/infra-deployments.git
        - name: component
          value: "${{ hasSuffix(ctx.targetFreight.origin.name, '-image-wh') ? trimSuffix(ctx.targetFreight.origin.name, '-image-wh') : (hasSuffix(ctx.targetFreight.origin.name, '-manifest-wh') ? trimSuffix(ctx.targetFreight.origin.name, '-manifest-wh') : ctx.targetFreight.origin.name) }}"
        - name: srcPath
          value: ./src
        - name: prevRing
          value: ring-1
        - name: targetRing
          value: ring-2
      steps:
        - uses: git-clone
          as: clone
          config:
            repoURL: ${{ vars.repoURL }}
            checkout:
              - branch: main
                path: ${{ vars.srcPath }}
        - task:
            name: promote-authentication-manifests
          as: promote-authentication
          vars:
            - name: prevRing
              value: ${{ vars.prevRing }}
            - name: targetRing
              value: ${{ vars.targetRing }}
            - name: srcPath
              value: ${{ vars.srcPath }}
            - name: component
              value: ${{ vars.component }}
        - uses: git-commit
          as: commit
          config:
            path: ${{ vars.srcPath }}
            message: |
              chore(${{ ctx.stage }}): promote ${{ vars.component }} to ${{ vars.targetRing }}
        - uses: git-push
          as: push
          config:
            path: ${{ vars.srcPath }}
            targetBranch: ${{ ctx.project }}/${{ vars.component }}/${{ vars.targetRing }}
            force: true
        - uses: git-open-pr
          as: open-pr
          continueOnError: true
          config:
            repoURL: ${{ vars.repoURL }}
            sourceBranch: ${{ ctx.project }}/${{ vars.component }}/${{ vars.targetRing }}
            targetBranch: main
            title: "chore(${{ ctx.stage }}): promote ${{ vars.component }} to ${{ vars.targetRing }}"
            description: |
              ### ${{ ctx.stage }}

              | | |
              |---|---|
              | **Component** | `${{ vars.component }}` |
              | **Project** | `${{ ctx.project }}` |
              | **Promotion** | `${{ ctx.promotion }}` |
              | **Freight** | `${{ ctx.targetFreight.alias }}` |

              ---

              ${{ (outputs['promote-' + vars.component + '.pr-meta']?.details) ?? ('Promotes `' + vars.component + '` to **' + ctx.stage + '**.') }}

              ---

              Manual approval required for Ring 2.

              > Branch is force-pushed each promotion cycle. Do not commit directly.
            labels:
              - ${{ vars.targetRing }}
              - automated-promotion
              - component/${{ vars.component }}
