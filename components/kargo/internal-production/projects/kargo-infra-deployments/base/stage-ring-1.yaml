---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: ring-1
  annotations:
    kargo.akuity.io/color: yellow
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: dummy-deployment
      sources:
        stages:
          - ring-0-dummy-deployment
    - origin:
        kind: Warehouse
        name: authentication-manifest-wh
      sources:
        direct: true
  promotionTemplate:
    spec:
      vars:
        - name: repoURL
          value: https://github.com/redhat-appstudio/infra-deployments.git
        - name: component
          value: ${{ ctx.targetFreight.origin.name }}
      steps:
        - uses: git-clone
          as: clone
          config:
            repoURL: ${{ vars.repoURL }}
            checkout:
              - branch: main
                path: ./src
        - task:
            name: dummy-deployment-promote-ring-1
          as: dummy-deployment-promote
          vars:
            - name: srcPath
              value: ./src
        - task:
            name: authentication-manifest-promote
          as: authentication-manifest-promote
          vars:
            - name: srcPath
              value: ./src
            - name: ring
              value: ring-1
        - uses: git-commit
          as: commit
          config:
            path: ./src
            message: |
              chore(${{ ctx.stage }}): promote ${{ vars.component }} to ring-1
        - uses: git-push
          as: push
          config:
            path: ./src
            targetBranch: ${{ ctx.project }}/${{ vars.component }}/ring-1
            force: true
        - uses: git-open-pr
          as: open-pr
          continueOnError: true
          config:
            repoURL: ${{ vars.repoURL }}
            sourceBranch: ${{ ctx.project }}/${{ vars.component }}/ring-1
            targetBranch: main
            title: "chore(${{ ctx.stage }}): promote ${{ vars.component }} to ring-1"
            description: |
              ### ${{ ctx.stage }}

              | | |
              |---|---|
              | **Component** | `${{ vars.component }}` |
              | **Project** | `${{ ctx.project }}` |
              | **Promotion** | `${{ ctx.promotion }}` |
              | **Freight** | `${{ ctx.targetFreight.alias }}` |

              ---

              ${{ (outputs[vars.component + '-promote.pr-meta']?.details) ?? ('Promotes `' + vars.component + '` to **' + ctx.stage + '**.') }}

              ---

              Auto-merged after CI passes. No manual approval required for Ring 1.

              > Branch is force-pushed each promotion cycle. Do not commit directly.
            labels:
              - ring-1
              - automated-promotion
              - component/${{ vars.component }}
        - task:
            name: wait-for-ci
          as: wait-for-ci
          vars:
            - name: commitSHA
              value: ${{ outputs['push'].commit }}
            - name: skipProwChecks
              value: "true"
        - uses: http
          as: find-pr
          retry:
            timeout: 5m
            errorThreshold: 10
          config:
            method: GET
            url: https://api.github.com/repos/redhat-appstudio/infra-deployments/pulls?head=redhat-appstudio:${{ ctx.project }}/${{ vars.component }}/ring-1&state=open
            headers:
              - name: Authorization
                value: Bearer ${{ secret('kargo-infra-deployments-secrets').github_pat }}
              - name: Accept
                value: application/vnd.github+json
            outputs:
              - name: prNumber
                fromExpression: response.body[0].number
            successExpression: response.status == 200 && len(response.body) > 0
            timeout: 30s
        - uses: git-merge-pr
          as: merge-pr
          retry:
            timeout: 2h
          config:
            repoURL: ${{ vars.repoURL }}
            prNumber: ${{ outputs['find-pr'].prNumber }}
            mergeMethod: squash
            wait: true
