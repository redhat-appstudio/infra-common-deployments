apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - route-and-oauth.yaml
  - rbac

namespace: kargo

generators:
- kargo-helm-generator.yaml

patches:
# Enable OCP service certificate for Kargo's API
- target:
    kind: Service
    name: kargo-api
  patch: |-
    apiVersion: v1
    kind: Service
    metadata:
      name: kargo-api
      annotations:
        service.beta.openshift.io/serving-cert-secret-name: kargo-api-cert

# Enable OCP service certificate for Kargo's Dex server
- target:
    kind: Service
    name: kargo-dex-server
  patch: |-
    apiVersion: v1
    kind: Service
    metadata:
      name: kargo-dex-server
      annotations:
        service.beta.openshift.io/serving-cert-secret-name: kargo-dex-server-cert

# Patch the callback url for the oauth client to the Kargo's API
- target:
    kind: ServiceAccount
    name: dex-client
  patch: |-
    apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: dex-client
      annotations:
        serviceaccounts.openshift.io/oauth-redirecturi.kargo: https://kargo-api-kargo.apps.rosa.kflux-c-prd-i01.7hyu.p3.openshiftapps.com/dex/callback

# Use OCP service CA as IDP CA instead of the chart's self-signed Dex TLS secret.
# Replaces projected sources list entirely (volumes merge by name,
# sources list has no merge key so it gets replaced wholesale).
# Must include the API TLS secret (api.tls.enabled defaults true) alongside
# the OCP CA configmap. Assumes no kubeconfigSecrets.kargo is set.
- target:
    kind: Deployment
    name: kargo-api
  patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: kargo-api
    spec:
      template:
        spec:
          volumes:
          - name: config
            projected:
              sources:
              - secret:
                  name: kargo-api-cert
                  items:
                  - key: tls.crt
                    path: tls.crt
                  - key: tls.key
                    path: tls.key
              - configMap:
                  name: ocp-service-ca
                  items:
                  - key: service-ca.crt
                    path: idp-ca.crt

# Don't run init container as root since OCP doesn't allow it with the default SCC.
# Targets by container name (parse-cabundle) instead of brittle list index.
- target:
    kind: Deployment
    name: kargo-api
  patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: kargo-api
    spec:
      template:
        spec:
          initContainers:
          - name: parse-cabundle
            securityContext:
              runAsUser: null
