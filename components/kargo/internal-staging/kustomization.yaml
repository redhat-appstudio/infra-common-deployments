---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment
  - projects

patches:
  - target:
      kind: ServiceAccount
      name: dex-client
    patch: |-
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: dex-client
        annotations:
          serviceaccounts.openshift.io/oauth-redirecturi.kargo: https://kargo-api-kargo.apps.rosa.kflux-c-stg-i01.qfla.p3.openshiftapps.com/dex/callback
