---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: kargo

generators:
  - kargo-helm-generator.yaml

patches:
  - target:
      kind: Service
      name: kargo-api
    patch: |-
      apiVersion: v1
      kind: Service
      metadata:
        name: kargo-api
        annotations:
          service.beta.openshift.io/serving-cert-secret-name: kargo-api-cert

  - target:
      kind: Service
      name: kargo-dex-server
    patch: |-
      apiVersion: v1
      kind: Service
      metadata:
        name: kargo-dex-server
        annotations:
          service.beta.openshift.io/serving-cert-secret-name: kargo-dex-server-cert

  - target:
      kind: Deployment
      name: kargo-api
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: kargo-api
      spec:
        template:
          spec:
            volumes:
            - name: config
              projected:
                sources:
                - secret:
                    name: kargo-api-cert
                    items:
                    - key: tls.crt
                      path: tls.crt
                    - key: tls.key
                      path: tls.key
                - configMap:
                    name: ocp-service-ca
                    items:
                    - key: service-ca.crt
                      path: idp-ca.crt

  - target:
      kind: Deployment
      name: kargo-api
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: kargo-api
      spec:
        template:
          spec:
            initContainers:
            - name: parse-cabundle
              securityContext:
                runAsUser: null

  # OpenShift OwnerReferencesPermissionEnforcement fix (upstream: akuity/kargo#5945)
  # JSON patch appends finalizer permissions so blockOwnerDeletion in ownerReferences works.
  - target:
      kind: ClusterRole
      name: kargo-controller
    patch: |-
      - op: add
        path: /rules/-
        value:
          apiGroups:
            - kargo.akuity.io
          resources:
            - freights/finalizers
            - promotions/finalizers
            - stages/finalizers
          verbs:
            - patch
            - update

