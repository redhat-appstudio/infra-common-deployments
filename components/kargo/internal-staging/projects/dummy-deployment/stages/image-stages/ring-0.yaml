apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: image-ring-0
  namespace: infra-demo
  annotations:
    kargo.akuity.io/color: pink
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: dummy-deployment-image-wh
      sources:
        direct: true
  promotionTemplate:
    spec:
      steps:
        - task:
            name: image-promotion
          vars:
            - name: ring
              value: ring-0
