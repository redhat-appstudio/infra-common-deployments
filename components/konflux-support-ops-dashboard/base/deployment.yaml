---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: support-ops-dashboard
  namespace: konflux-support-ops-dashboard
  labels:
    app: support-ops-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: support-ops-dashboard
  template:
    metadata:
      labels:
        app: support-ops-dashboard
    spec:
      containers:
        - name: dashboard
          image: quay.io/redhat-user-workloads/konflux-user-support-tenant/chat-bot/user-support@sha256:d331250490d4e11417b277bad9ca826c222daeffef5cd68a619f953816f42296
          imagePullPolicy: Always
          command:
            - python
          args:
            - cmds/weekly_support_dashboard.py
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - "ALL"
            seccompProfile:
              type: RuntimeDefault
            readOnlyRootFilesystem: true
            runAsNonRoot: true
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 100m
              memory: 128Mi
