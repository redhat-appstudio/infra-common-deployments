apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: rover-group-sync

images:
- name: rover-group-sync
  digest: sha256:480e798b8479003a8bc6827de45e151ecb095202569d6df30acaeae697bbbe98

resources:
  - ../base

# Narrow LDAP group sync for staging only (production keeps base konflux-* filter).
configMapGenerator:
  - name: rover-group-sync-config
    behavior: merge
    files:
      - ldap-sync-config.yaml=./ldap-sync-config.yaml
generatorOptions:
  disableNameSuffixHash: true
