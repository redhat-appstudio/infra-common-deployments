apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - external-secrets

patches:
    - path: patches/argocd-controller-replicas-patch.yaml
      target:
        group: argoproj.io
        version: v1beta1
        kind: ArgoCD
    - path: patches/source-path-patch.yaml
      target:
        group: argoproj.io
        version: v1alpha1
        kind: Application
        name: infra-deployments-all-application-sets
